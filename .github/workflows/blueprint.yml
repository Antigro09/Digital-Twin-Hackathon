name: Blueprint publication

on:
  pull_request:
    paths:
      - "docs/enterprise-digital-twin/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "requirements-docs.txt"
      - ".github/workflows/blueprint.yml"
  push:
    branches: [main]
    paths:
      - "docs/enterprise-digital-twin/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "requirements-docs.txt"
      - ".github/workflows/blueprint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: blueprint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-publish:
    name: Validate and publish specification
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install pinned Python dependencies
        run: |
          python -m pip install --disable-pip-version-check --requirement requirements-docs.txt
          python -m pip check

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.17.0"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked Node dependencies
        run: npm ci

      - name: Install PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends poppler-utils

      - name: Render version-controlled diagrams
        run: npm run render:diagrams

      - name: Validate normative specification and traceability
        run: python scripts/validate_blueprint.py

      - name: Prove traceability dimensions fail closed
        run: python scripts/test_traceability_fail_closed.py

      - name: Build consolidated Markdown and HTML
        run: python scripts/build_blueprint.py

      - name: Render publication PDF
        run: python scripts/render_pdf.py

      - name: Smoke-check generated editions
        run: |
          test -s output/enterprise-digital-twin-blueprint.md
          test -s output/html/enterprise-digital-twin-blueprint.html
          test -s output/traceability-report.json
          test -s output/traceability-report.md
          test -s output/pdf/enterprise-digital-twin-blueprint.pdf
          python -c 'from pathlib import Path; from pypdf import PdfReader; p=Path("output/pdf/enterprise-digital-twin-blueprint.pdf"); r=PdfReader(str(p)); assert len(r.pages) >= 10, len(r.pages); assert "Enterprise Digital Twin" in str(r.metadata.title); assert all(float(page.mediabox.width) > 0 and float(page.mediabox.height) > 0 for page in r.pages)'
          pdfinfo output/pdf/enterprise-digital-twin-blueprint.pdf
          pdftotext output/pdf/enterprise-digital-twin-blueprint.pdf /tmp/enterprise-digital-twin-blueprint.txt
          test -s /tmp/enterprise-digital-twin-blueprint.txt
          pdftoppm -f 1 -singlefile -png -r 96 output/pdf/enterprise-digital-twin-blueprint.pdf /tmp/enterprise-digital-twin-cover
          test -s /tmp/enterprise-digital-twin-cover.png

      - name: Upload generated publication
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: enterprise-digital-twin-blueprint-${{ github.sha }}
          path: |
            output/enterprise-digital-twin-blueprint.md
            output/html/enterprise-digital-twin-blueprint.html
            output/pdf/enterprise-digital-twin-blueprint.pdf
            output/traceability-report.json
            output/traceability-report.md
            docs/enterprise-digital-twin/diagrams/generated/
          if-no-files-found: error
          retention-days: 14
