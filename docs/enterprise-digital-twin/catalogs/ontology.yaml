relationship_defaults:
  cardinality: Declared by ontology constraint; violations are quarantined rather than silently repaired.
  directionality: Directed canonical edge with an optional declared inverse.
  strength: Optional normalized 0-to-1 score with method and version.
  confidence: Required for inferred edges and fixed at 1.0 only for authoritative deterministic mappings.
  temporal: Valid-from valid-to observed-at and system version.
  provenance: One or more supporting claims and evidence references.
  permissions: Visible only when edge policy endpoints and qualifying evidence are all visible.
  creation: Deterministic mapping model proposal or authorized manual assertion with method recorded.
  deletion: Tombstone and projection removal; source claim history retained per policy.
  merge: Duplicate edges combine evidence but never broaden ACLs; conflicting semantics remain separate claims.
relationship_types:
  - {id: EDGE-PART-OF, name: PART_OF, meaning: Subject belongs structurally to object.}
  - {id: EDGE-REPORTS-TO, name: REPORTS_TO, meaning: Person has a time-bounded reporting relationship to manager.}
  - {id: EDGE-SUPERVISES, name: SUPERVISES, meaning: Role oversees a person team process or asset.}
  - {id: EDGE-MEMBER-OF, name: MEMBER_OF, meaning: Person or team is a member of an organizational unit.}
  - {id: EDGE-WORKS-ON, name: WORKS_ON, meaning: Person or team contributes to a project or work item.}
  - {id: EDGE-OWNS, name: OWNS, meaning: Subject is accountable for object lifecycle.}
  - {id: EDGE-CREATED, name: CREATED, meaning: Subject created object.}
  - {id: EDGE-ASSIGNED, name: ASSIGNED_TO, meaning: Work is assigned to a person team or role.}
  - {id: EDGE-RESPONSIBLE, name: RESPONSIBLE_FOR, meaning: Actor team or role is accountable for a resource or outcome.}
  - {id: EDGE-DEPENDS, name: DEPENDS_ON, meaning: Subject requires object before or during successful operation.}
  - {id: EDGE-REQUIRES, name: REQUIRES, meaning: Subject has an explicit requirement for object.}
  - {id: EDGE-BLOCKS, name: BLOCKS, meaning: Subject prevents progress of object.}
  - {id: EDGE-USES, name: USES, meaning: Subject consumes or operates object.}
  - {id: EDGE-CALLS, name: CALLS, meaning: Software component invokes an API or service.}
  - {id: EDGE-HOSTED, name: HOSTED_ON, meaning: Software or data object runs on infrastructure.}
  - {id: EDGE-CONNECTED, name: CONNECTED_TO, meaning: Assets or systems have a declared connection.}
  - {id: EDGE-IMPLEMENTS, name: IMPLEMENTS, meaning: Subject realizes a requirement policy feature or interface.}
  - {id: EDGE-PRODUCES, name: PRODUCES, meaning: Process service or person emits an artifact or outcome.}
  - {id: EDGE-DEPLOYED, name: DEPLOYED, meaning: Artifact or service was released by a deployment.}
  - {id: EDGE-APPROVED, name: APPROVED, meaning: Actor granted an exact scoped approval.}
  - {id: EDGE-MENTIONS, name: MENTIONS, meaning: Content explicitly mentions an entity candidate.}
  - {id: EDGE-REFERENCES, name: REFERENCES, meaning: Artifact intentionally cites or links another object.}
  - {id: EDGE-LINKED, name: LINKED_TO, meaning: Source system declares a generic link pending stronger semantics.}
  - {id: EDGE-GENERATED, name: GENERATED, meaning: Process model or agent produced object.}
  - {id: EDGE-OBSERVES, name: OBSERVES, meaning: Sensor metric or analysis observes object.}
  - {id: EDGE-LOCATED, name: LOCATED_IN, meaning: Entity has a time-bounded physical or logical location.}
  - {id: EDGE-AFFECTS, name: AFFECTS, meaning: Event risk or change has evidence-backed impact on object.}
  - {id: EDGE-INFLUENCES, name: INFLUENCES, meaning: Subject is modeled as a non-causal influence with explicit method.}
  - {id: EDGE-RELATES, name: RELATES_TO, meaning: Weak generic association used only when no stronger type is justified.}
  - {id: EDGE-FORECASTS, name: FORECASTS, meaning: Forecast predicts a typed outcome for object.}
  - {id: EDGE-SERVES, name: SERVES, meaning: Team product or service supports a customer or account.}
  - {id: EDGE-SOLD, name: SOLD_TO, meaning: Offering order or subscription is sold to a customer account.}
  - {id: EDGE-BILLED, name: BILLED_TO, meaning: Invoice or charge is billed to an authorized account.}
  - {id: EDGE-SUPPLIED, name: SUPPLIED_BY, meaning: Item service or asset is supplied by a vendor.}
  - {id: EDGE-EVIDENCE, name: EVIDENCED_BY, meaning: Claim relationship answer or decision is supported by evidence.}
  - {id: EDGE-DERIVED, name: DERIVED_FROM, meaning: Object or claim was deterministically or probabilistically derived from source.}
  - {id: EDGE-COMPENSATES, name: COMPENSATES, meaning: Action reverses or mitigates an earlier action.}
