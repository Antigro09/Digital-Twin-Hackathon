{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: edt-default-deny}
spec:
  podSelector:
    matchLabels: {app.kubernetes.io/instance: {{ .Release.Name }}}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: edt-workload-flows}
spec:
  podSelector:
    matchLabels: {app.kubernetes.io/instance: {{ .Release.Name }}}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector: {}
      ports: [{protocol: TCP, port: 3000}, {protocol: TCP, port: 8080}, {protocol: TCP, port: 8090}]
  egress:
    - to:
        - namespaceSelector: {}
      ports: [{protocol: TCP, port: 443}, {protocol: TCP, port: 5432}, {protocol: TCP, port: 7233}, {protocol: TCP, port: 7687}, {protocol: TCP, port: 8080}, {protocol: TCP, port: 9000}]
    - to: []
      ports: [{protocol: UDP, port: 53}, {protocol: TCP, port: 53}]
{{- end }}
