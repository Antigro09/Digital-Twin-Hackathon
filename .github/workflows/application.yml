name: H1 application

on:
  pull_request:
    paths:
      - "apps/**"
      - "deploy/**"
      - "scripts/**"
      - "compose.yaml"
      - ".dockerignore"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/application.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: application-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-h1:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.12.0"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.11"
          cache: pip
          cache-dependency-path: apps/ai-worker/pyproject.toml

      - name: Install locked dependencies
        run: |
          npm ci
          python -m pip install --disable-pip-version-check --editable "apps/ai-worker[test]"
          python -m pip check

      - name: Reject High and Critical dependency findings
        run: |
          npm audit --audit-level=high
          python -m pip install --disable-pip-version-check pip-audit==2.9.0
          python -m pip_audit --strict

      - name: Continuous security and architecture audit
        run: python scripts/continuous_audit.py

      - name: Validate deployment sources
        run: |
          docker compose --file compose.yaml config --quiet
          python scripts/validate_deployment.py

      - name: Type-check and test isolated workloads
        run: |
          npm run typecheck --workspaces --if-present
          npm run test --workspace @edt/sync-worker
          npm run test --workspace @edt/web
          npm run test:e2e --workspace @edt/api
          python -m pytest apps/ai-worker/tests -q

      - name: Build production workloads
        run: npm run build

      - name: Run live API to worker to web-client journey
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=apps/ai-worker/src python -m uvicorn edt_ai_worker.api:app --host 127.0.0.1 --port 8010 > /tmp/edt-ai.log 2>&1 &
          AI_PID=$!
          PORT=8080 AI_WORKER_URL=http://127.0.0.1:8010 EDT_ALLOW_ORACLE_FALLBACK=false EDT_DEMO_AUTH=true EDT_FROZEN_CLOCK=true npm run start --workspace @edt/api > /tmp/edt-api.log 2>&1 &
          API_PID=$!
          cleanup() { kill "$API_PID" "$AI_PID" 2>/dev/null || true; }
          trap cleanup EXIT
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:8080/readyz >/dev/null; then break; fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:8080/readyz >/dev/null || { cat /tmp/edt-api.log /tmp/edt-ai.log; exit 1; }
          EDT_LIVE_API_URL=http://127.0.0.1:8080 npm run test --workspace @edt/web -- --run src/lib/api/live-client.integration.test.ts || { cat /tmp/edt-api.log /tmp/edt-ai.log; exit 1; }

      - name: Build OCI images
        run: docker compose --file compose.yaml build api sync-worker ai-worker web
