name: enterprise-digital-twin

services:
  postgres:
    image: postgres:17.5-bookworm
    environment:
      POSTGRES_DB: edt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edt-local-postgres-only}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edt"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [data]

  postgres-app-db-init:
    image: postgres:17.5-bookworm
    environment:
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:-edt-local-postgres-only}
      EDT_DATABASE_NAME: ${EDT_DATABASE_NAME:-edt_hardened}
      AI_DATABASE_USER: edt_ai_worker
      AI_DATABASE_PASSWORD: ${AI_DATABASE_PASSWORD:?run npm run demo once to generate the AI database credential}
    command:
      - /bin/bash
      - -ec
      - |
        if [[ ! "$${EDT_DATABASE_NAME}" =~ ^[a-z][a-z0-9_]{0,62}$ ]]; then
          echo "EDT_DATABASE_NAME must be a safe PostgreSQL identifier." >&2
          exit 2
        fi
        if [[ "$$(psql --dbname postgres --tuples-only --no-align --command "select 1 from pg_database where datname = '$${EDT_DATABASE_NAME}'")" != "1" ]]; then
          createdb --maintenance-db postgres "$${EDT_DATABASE_NAME}"
        fi
        if [[ ! "$${AI_DATABASE_USER}" =~ ^[a-z][a-z0-9_]{0,62}$ ]]; then
          echo "AI_DATABASE_USER must be a safe PostgreSQL identifier." >&2
          exit 2
        fi
        psql --dbname "$${EDT_DATABASE_NAME}" \
          --set=ai_user="$${AI_DATABASE_USER}" \
          --set=ai_password="$${AI_DATABASE_PASSWORD}" \
          --set=app_db="$${EDT_DATABASE_NAME}" <<'SQL'
        SELECT format(
          'CREATE ROLE %I LOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS PASSWORD %L',
          :'ai_user', :'ai_password'
        ) WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = :'ai_user') \gexec
        SELECT format(
          'ALTER ROLE %I LOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS PASSWORD %L',
          :'ai_user', :'ai_password'
        ) \gexec
        SELECT format('GRANT CONNECT ON DATABASE %I TO %I', :'app_db', :'ai_user') \gexec
        SELECT format('CREATE SCHEMA IF NOT EXISTS edt_ai AUTHORIZATION %I', :'ai_user') \gexec
        SELECT format('ALTER SCHEMA edt_ai OWNER TO %I', :'ai_user') \gexec
        SELECT 'ALTER TABLE public.edt_ai_records SET SCHEMA edt_ai'
        WHERE to_regclass('public.edt_ai_records') IS NOT NULL
          AND to_regclass('edt_ai.edt_ai_records') IS NULL \gexec
        SELECT format('ALTER TABLE edt_ai.edt_ai_records OWNER TO %I', :'ai_user')
        WHERE to_regclass('edt_ai.edt_ai_records') IS NOT NULL \gexec
        SELECT format(
          'ALTER ROLE %I IN DATABASE %I SET search_path TO edt_ai, pg_catalog',
          :'ai_user', :'app_db'
        ) \gexec
        SQL
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [data]

  temporal:
    image: temporalio/auto-setup:1.27.2
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-edt-local-postgres-only}
      POSTGRES_SEEDS: postgres
      BIND_ON_IP: 0.0.0.0
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "127.0.0.1:7233"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 30
    restart: unless-stopped
    networks: [edge, control, data]

  temporal-ui:
    image: temporalio/ui:2.34.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:${EDT_WEB_PORT:-3000}
    depends_on:
      temporal:
        condition: service_healthy
    ports:
      - "${TEMPORAL_UI_PORT:-8233}:8080"
    restart: unless-stopped
    networks: [edge, control]

  neo4j:
    image: neo4j:5.26.8-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-edt-local-neo4j-only}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j-data:/data
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1' >/dev/null 2>&1"]
      interval: 15s
      timeout: 20s
      start_period: 60s
      retries: 20
    restart: unless-stopped
    networks: [edge, data]

  valkey:
    image: valkey/valkey:8.1.3-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [data]

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-edtminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-edt-local-minio-only}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [edge, data]

  ai-worker:
    build:
      context: ./apps/ai-worker
      dockerfile: Dockerfile
    environment:
      PYTHONHASHSEED: "0"
      AI_WORKER_SHARED_SECRET: ${AI_WORKER_SHARED_SECRET:?run npm run demo once to generate the internal AI service credential}
      AI_STORE_DSN: postgresql://edt_ai_worker:${AI_DATABASE_PASSWORD:?run npm run demo once to generate the AI database credential}@postgres:5432/${EDT_DATABASE_NAME:-edt_hardened}
      AI_DURABLE_STORE_REQUIRED: "true"
      AI_PROVIDER_DEFAULT: ${AI_PROVIDER_DEFAULT:-llama}
      AI_REASONING_PROVIDER: ${AI_REASONING_PROVIDER:-llama}
      LLAMA_API_KEY: ${LLAMA_API_KEY:-}
      LLAMA_MODEL: ${LLAMA_MODEL:-}
      LLAMA_REASONING_MODEL: ${LLAMA_REASONING_MODEL:-}
      LLAMA_ENDPOINT: ${LLAMA_ENDPOINT:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_ENDPOINT: ${OPENAI_ENDPOINT:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      ANTHROPIC_ENDPOINT: ${ANTHROPIC_ENDPOINT:-}
      CUSTOM_AI_API_KEY: ${CUSTOM_AI_API_KEY:-}
      CUSTOM_AI_MODEL: ${CUSTOM_AI_MODEL:-}
      CUSTOM_AI_ENDPOINT: ${CUSTOM_AI_ENDPOINT:-}
      AI_EMBEDDING_API_KEY: ${AI_EMBEDDING_API_KEY:-}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-}
      AI_EMBEDDING_ENDPOINT: ${AI_EMBEDDING_ENDPOINT:-}
      AI_VECTOR_DIMENSIONS: ${AI_VECTOR_DIMENSIONS:-256}
      AI_GATEWAY_TIMEOUT_SECONDS: ${AI_GATEWAY_TIMEOUT_SECONDS:-20}
      AI_GATEWAY_MAX_RETRIES: ${AI_GATEWAY_MAX_RETRIES:-2}
      AI_GATEWAY_MAX_INPUT_TOKENS: ${AI_GATEWAY_MAX_INPUT_TOKENS:-24000}
      AI_GATEWAY_MAX_OUTPUT_TOKENS: ${AI_GATEWAY_MAX_OUTPUT_TOKENS:-4096}
      AI_GATEWAY_REQUESTS_PER_MINUTE: ${AI_GATEWAY_REQUESTS_PER_MINUTE:-30}
      AI_GATEWAY_CACHE_TTL_SECONDS: ${AI_GATEWAY_CACHE_TTL_SECONDS:-300}
      AI_GATEWAY_MAX_CACHE_ENTRIES: ${AI_GATEWAY_MAX_CACHE_ENTRIES:-1000}
      AI_GATEWAY_MAX_DOCUMENT_BYTES: ${AI_GATEWAY_MAX_DOCUMENT_BYTES:-5242880}
      AI_MAX_RETRIEVAL_CANDIDATES: ${AI_MAX_RETRIEVAL_CANDIDATES:-10000}
      AI_SESSION_TTL_MINUTES: ${AI_SESSION_TTL_MINUTES:-60}
      AI_LLAMA_INPUT_USD_PER_MILLION: ${AI_LLAMA_INPUT_USD_PER_MILLION:-}
      AI_LLAMA_OUTPUT_USD_PER_MILLION: ${AI_LLAMA_OUTPUT_USD_PER_MILLION:-}
      AI_OPENAI_INPUT_USD_PER_MILLION: ${AI_OPENAI_INPUT_USD_PER_MILLION:-}
      AI_OPENAI_OUTPUT_USD_PER_MILLION: ${AI_OPENAI_OUTPUT_USD_PER_MILLION:-}
      AI_ANTHROPIC_INPUT_USD_PER_MILLION: ${AI_ANTHROPIC_INPUT_USD_PER_MILLION:-}
      AI_ANTHROPIC_OUTPUT_USD_PER_MILLION: ${AI_ANTHROPIC_OUTPUT_USD_PER_MILLION:-}
      AI_CUSTOM_INPUT_USD_PER_MILLION: ${AI_CUSTOM_INPUT_USD_PER_MILLION:-}
      AI_CUSTOM_OUTPUT_USD_PER_MILLION: ${AI_CUSTOM_OUTPUT_USD_PER_MILLION:-}
    depends_on:
      postgres-app-db-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${EDT_AI_PORT:-8010}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [control, data, ai-egress]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-edt-local-postgres-only}@postgres:5432/${EDT_DATABASE_NAME:-edt_hardened}
      EDT_REQUIRE_POSTGRES: "true"
      EDT_AUTO_MIGRATE: "true"
      EDT_DEMO_AUTH: "true"
      EDT_DEMO_AUTH_SECRET: ${EDT_DEMO_AUTH_SECRET:?run npm run demo once to generate local demo authentication secrets}
      EDT_DEMO_AUTH_BOOTSTRAP_KEY: ${EDT_DEMO_AUTH_BOOTSTRAP_KEY:?run npm run demo once to generate local demo authentication secrets}
      AI_WORKER_SHARED_SECRET: ${AI_WORKER_SHARED_SECRET:?run npm run demo once to generate the internal AI service credential}
      EDT_DEMO_AUTH_TTL_SECONDS: "900"
      EDT_FROZEN_CLOCK: "true"
      EDT_ALLOW_ORACLE_FALLBACK: "false"
      AI_WORKER_URL: http://ai-worker:8080
      SIMULATION_WORKER_TIMEOUT_MS: ${SIMULATION_WORKER_TIMEOUT_MS:-60000}
      WEB_ORIGIN: http://localhost:${EDT_WEB_PORT:-3000}
    depends_on:
      postgres-app-db-init:
        condition: service_completed_successfully
      ai-worker:
        condition: service_healthy
    ports:
      - "${EDT_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/readyz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [edge, control, data]

  sync-worker:
    build:
      context: .
      dockerfile: apps/sync-worker/Dockerfile
    environment:
      PORT: 8090
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-edt-local-postgres-only}@postgres:5432/${EDT_DATABASE_NAME:-edt_hardened}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-edtminio}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-edt-local-minio-only}
      S3_SOURCE_BUCKET: edt-source-payloads
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-edt-local-neo4j-only}
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_SYNC_TASK_QUEUE: edt-sync-v1
    depends_on:
      api:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      temporal:
        condition: service_healthy
    ports:
      - "${EDT_SYNC_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8090/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [edge, control, data]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${EDT_API_PORT:-8080}
        NEXT_PUBLIC_ENABLE_DEMO_DATA: "false"
    depends_on:
      api:
        condition: service_healthy
    environment:
      EDT_DEMO_AUTH: "true"
      EDT_DEMO_AUTH_BOOTSTRAP_KEY: ${EDT_DEMO_AUTH_BOOTSTRAP_KEY:?run npm run demo once to generate local demo authentication secrets}
      EDT_DEMO_UI_ACCESS_KEY: ${EDT_DEMO_UI_ACCESS_KEY:?run npm run demo once to generate the local demo UI access key}
      EDT_API_INTERNAL_URL: http://api:8080
    ports:
      - "${EDT_WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [edge]

networks:
  edge: {}
  control:
    internal: true
  data:
    internal: true
  ai-egress: {}

volumes:
  postgres-data: {}
  neo4j-data: {}
  minio-data: {}
