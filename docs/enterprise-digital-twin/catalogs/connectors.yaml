schema_version: 1
connector_defaults:
  isolation: Tenant-scoped credential egress allowlist quotas sandboxed parsing and independent revocation.
  synchronization: Signed webhook plus periodic reconciliation cursor checkpoints idempotency tombstones and dead-letter review.
  security: Least scopes envelope-encrypted secrets no secret in model context and source ACL propagation.
  certification: Contract tests synthetic fixture permission tests replay tests failure tests and security review.
connectors:
  - id: CON-GITHUB
    name: GitHub
    status: committed
    horizon: H1
    auth: GitHub App installation scoped to allowlisted sandbox repositories.
    reads: [repositories, teams, commits_metadata, pull_requests, reviews, issues, milestones, labels, dependency_links]
    excludes: [source_file_bodies, secrets, actions_logs, private_messages, unrestricted_organization_data]
    writes: []
  - id: CON-JIRA
    name: Jira Cloud
    status: committed
    horizon: H1
    auth: OAuth installation scoped to allowlisted sandbox projects.
    reads: [projects, issues, sprints, versions, links, comments, status_history, users]
    writes: [dual_approved_remediation_issue_only]
    approval: Two distinct approvers exact payload 15-minute expiry and idempotency receipt.
  - {id: CON-GOOGLE, name: Google Workspace, status: provisional, horizon: H2, capabilities: [Drive, Gmail, Calendar, Meet]}
  - {id: CON-M365, name: Microsoft 365, status: provisional, horizon: H2, capabilities: [SharePoint, OneDrive, Outlook, Calendar, Teams]}
  - {id: CON-SLACK, name: Slack, status: provisional, horizon: H2, capabilities: [channels, threads, huddles_metadata]}
  - {id: CON-GITLAB, name: GitLab, status: provisional, horizon: H2, capabilities: [repositories, merge_requests, issues, pipelines]}
  - {id: CON-LINEAR, name: Linear, status: provisional, horizon: H2, capabilities: [teams, projects, issues, cycles]}
  - {id: CON-NOTION, name: Notion, status: provisional, horizon: H2, capabilities: [pages, databases, comments]}
  - {id: CON-CONFLUENCE, name: Confluence, status: provisional, horizon: H2, capabilities: [spaces, pages, comments]}
  - {id: CON-SALESFORCE, name: Salesforce, status: provisional, horizon: H3, capabilities: [accounts, opportunities, cases, activities]}
  - {id: CON-HUBSPOT, name: HubSpot, status: provisional, horizon: H3, capabilities: [companies, contacts, deals, tickets]}
  - {id: CON-SERVICENOW, name: ServiceNow, status: provisional, horizon: H3, capabilities: [incidents, changes, assets, service_catalog]}
  - {id: CON-AWS, name: AWS, status: provisional, horizon: H3, capabilities: [organizations, resources, cloudtrail_metadata, cost]}
  - {id: CON-AZURE, name: Azure, status: provisional, horizon: H3, capabilities: [tenants, resources, activity_metadata, cost]}
