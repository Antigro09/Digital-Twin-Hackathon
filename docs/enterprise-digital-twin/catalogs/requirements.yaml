schema_version: 1
requirements:
  - {id: REQ-GOV-001, title: Versioned documentation product, statement: The blueprint MUST be source controlled and release consolidated Markdown HTML and PDF editions., horizon: H1, status: committed}
  - {id: REQ-GOV-002, title: Stable traceability, statement: Every normative requirement MUST map to decisions controls acceptance evidence and a delivery horizon., horizon: H1, status: committed}
  - {id: REQ-GOV-003, title: Finite review gate, statement: Release MUST use measurable risk and independent review exit criteria rather than an unbounded perfection claim., horizon: H1, status: committed}
  - {id: REQ-GOV-004, title: Explicit decision status, statement: Capabilities MUST be marked Committed Provisional Research or Rejected., horizon: H1, status: committed}
  - {id: REQ-PROD-001, title: Living organizational model, statement: The product MUST maintain a continuously synchronized evidence-backed representation of organizational entities activity and dependencies., horizon: H2, status: committed}
  - {id: REQ-PROD-002, title: Grounded organizational answers, statement: Answers MUST cite accessible evidence and abstain when evidence is insufficient., horizon: H1, status: committed}
  - {id: REQ-PROD-003, title: Graph simulation wedge, statement: H1 MUST explain launch risk and compare a user-confirmed staffing scope or dependency scenario., horizon: H1, status: committed}
  - {id: REQ-PROD-004, title: Governed action wedge, statement: H1 MUST preview dual-authorize execute audit and compensate one allowlisted Jira remediation mutation., horizon: H1, status: committed}
  - {id: REQ-PROD-005, title: Cross-industry extensibility, statement: The core metamodel MUST support namespaced domain and customer ontology packages without changing core code., horizon: H2, status: committed}
  - {id: REQ-PHY-001, title: Synthetic asset telemetry, statement: H1 MUST produce deterministic timestamped synthetic physical-asset telemetry with typed units sequence quality freshness and reproducible replay metadata., horizon: H1, status: committed}
  - {id: REQ-PHY-002, title: Accessible physical 3D-style view, statement: H1 MUST provide an interactive component-linked procedural perspective asset view with keyboard reduced-motion and complete structured alternatives., horizon: H1, status: committed}
  - {id: REQ-PHY-003, title: Honest deterministic asset analytics, statement: H1 anomaly and forecast output MUST be deterministic versioned explainable and labeled synthetic without validated machine-learning or real failure-prediction claims., horizon: H1, status: committed}
  - {id: REQ-PHY-004, title: Synthetic asset lifecycle, statement: H1 MUST expose versioned synthetic design manufacture commissioning service maintenance and decommissioning history without claiming source-system synchronization., horizon: H1, status: committed}
  - {id: REQ-PHY-005, title: Guarded simulator control, statement: H1 MUST restrict asset commands to tenant-authorized allowlisted simulator-only previews with expected-version range transition idempotency and audit checks and no device egress., horizon: H1, status: committed}
  - {id: REQ-ARCH-001, title: Modular deployables, statement: H1 MUST use bounded web API connector-worker and AI-simulation workloads in a modular monorepo., horizon: H1, status: committed}
  - {id: REQ-ARCH-002, title: Durable workflows, statement: Long-running sync agent approval and simulation operations MUST use durable workflow semantics., horizon: H1, status: committed}
  - {id: REQ-ARCH-003, title: Transactional events, statement: Domain events MUST be emitted through a transactional outbox before any external event backbone is introduced., horizon: H1, status: committed}
  - {id: REQ-ARCH-004, title: Cloud-neutral contracts, statement: Domain code MUST depend on OCI PostgreSQL S3 OIDC OpenTelemetry and workflow contracts rather than cloud-specific SDKs., horizon: H2, status: committed}
  - {id: REQ-ARCH-005, title: Measured service extraction, statement: Microservices service mesh Kafka NATS and specialized stores MUST require an accepted benchmark or isolation ADR., horizon: H3, status: provisional}
  - {id: REQ-ARCH-006, title: Offline deployment profiles, statement: On-premises air-gapped edge and offline modes MUST remain gated profiles with explicit capability differences., horizon: H4, status: provisional}
  - {id: REQ-ARCH-007, title: Public interface portfolio, statement: The platform MUST define REST SSE webhooks events GraphQL gRPC MCP plugin SDK and CLI contracts with clear horizon ownership., horizon: H2, status: committed}
  - {id: REQ-TEN-001, title: Server-derived tenant context, statement: Clients MUST NOT select authoritative tenant context and every request MUST bind it from authenticated membership., horizon: H1, status: committed}
  - {id: REQ-TEN-002, title: Tenant-scoped storage, statement: Every row object event edge vector cache key trace and audit record MUST carry an immutable tenant identifier., horizon: H1, status: committed}
  - {id: REQ-TEN-003, title: Database tenant fence, statement: PostgreSQL RLS and tenant-qualified constraints MUST enforce relational tenant isolation independent of application filters., horizon: H1, status: committed}
  - {id: REQ-TEN-004, title: Derived-store isolation, statement: Graph search vector object cache and queue projections MUST use independently enforceable tenant namespaces and negative isolation tests., horizon: H1, status: committed}
  - {id: REQ-TEN-005, title: No implicit cross-tenant learning, statement: Retrieval resolution memory analytics and model training MUST NOT combine tenants without a separately recorded opt-in design., horizon: H1, status: committed}
  - {id: REQ-DATA-001, title: Authoritative claims, statement: PostgreSQL MUST be authoritative for observations claims evidence identity resolution approvals scenarios and audit indexes., horizon: H1, status: committed}
  - {id: REQ-DATA-002, title: Bitemporal provenance, statement: Every claim MUST include valid time system time confidence evidence classification source revision and source ACL., horizon: H1, status: committed}
  - {id: REQ-DATA-003, title: Rebuildable projections, statement: Graph search and vector stores MUST be rebuildable after ACL correction deletion or ontology changes., horizon: H1, status: committed}
  - {id: REQ-DATA-004, title: Reversible resolution, statement: Entity merges MUST preserve source identities evidence and a reversible decision history., horizon: H1, status: committed}
  - {id: REQ-DATA-005, title: Versioned ontology, statement: Entity relationship property constraint and migration definitions MUST be versioned and namespaced., horizon: H1, status: committed}
  - {id: REQ-DATA-006, title: Core domain coverage, statement: The ontology MUST cover organization work engineering customers finance infrastructure governance knowledge and physical-asset domains., horizon: H2, status: committed}
  - {id: REQ-DATA-007, title: Lifecycle completeness, statement: Every entity and relationship type MUST define ownership permissions lifecycle history search retention deletion and archive behavior., horizon: H2, status: committed}
  - {id: REQ-DATA-008, title: Object integrity, statement: Raw source objects MUST be content-addressed encrypted classified retention-tagged and immutable except for cryptographic erasure., horizon: H2, status: committed}
  - {id: REQ-DATA-009, title: Deletion propagation, statement: Tenant and data-subject deletion MUST cover authoritative and all derived stores while preserving minimum lawful audit evidence., horizon: H2, status: committed}
  - {id: REQ-CON-001, title: Least-privilege GitHub, statement: H1 GitHub access MUST be read-only metadata for allowlisted sandbox repositories and exclude source bodies secrets logs and private messages., horizon: H1, status: committed}
  - {id: REQ-CON-002, title: Bounded Jira mutation, statement: H1 Jira access MUST be restricted to allowlisted projects and the exact approved remediation issue mutation., horizon: H1, status: committed}
  - {id: REQ-CON-003, title: Verifiable synchronization, statement: Connectors MUST verify webhooks reconcile periodically checkpoint cursors deduplicate events and preserve tombstones., horizon: H1, status: committed}
  - {id: REQ-CON-004, title: Compromised connector containment, statement: Connector execution MUST isolate credentials egress parsing quotas and tenant effects and support immediate revocation., horizon: H1, status: committed}
  - {id: REQ-CON-005, title: Connector SDK, statement: H2 MUST define manifests authentication discovery backfill incremental sync writes errors observability testing and certification contracts., horizon: H2, status: committed}
  - {id: REQ-AI-001, title: OpenAI-first gateway, statement: AI workloads MUST use the Responses API and Agents SDK behind capability policy budget and evaluation interfaces., horizon: H1, status: committed}
  - {id: REQ-AI-002, title: Bounded capability agents, statement: Agents MUST be versioned capability profiles with explicit tools memory context limits handoff rules retries evaluation and termination., horizon: H1, status: committed}
  - {id: REQ-AI-003, title: Deterministic policy envelope, statement: Authorization retrieval validation execution verification citation approval and audit MUST surround all model behavior., horizon: H1, status: committed}
  - {id: REQ-AI-004, title: Untrusted content separation, statement: Connector and user content MUST NOT become privileged instructions or grant tools and all model outputs MUST be schema validated., horizon: H1, status: committed}
  - {id: REQ-AI-005, title: Scoped memory, statement: Agent memory MUST be explicit tenant-scoped permission-trimmed versioned and deletable with no invisible self-modification., horizon: H1, status: committed}
  - {id: REQ-AI-006, title: No raw chain of thought, statement: The platform MUST retain evidence structured rationale action traces and model versions rather than expose or store private chain of thought., horizon: H1, status: committed}
  - {id: REQ-AI-007, title: Evaluated model routing, statement: Model snapshots prompts tools and fallbacks MUST pass use-case safety quality latency and cost evaluations before promotion., horizon: H1, status: committed}
  - {id: REQ-AI-008, title: Delegation cannot expand power, statement: A child agent MUST inherit the intersection of user tenant caller workflow and tool policy authority., horizon: H1, status: committed}
  - {id: REQ-ACT-001, title: Exact-payload approval, statement: Approval MUST bind tenant actor credential target canonical arguments expiry policy version and idempotency key., horizon: H1, status: committed}
  - {id: REQ-ACT-002, title: Dual control, statement: H1 external mutation MUST require two distinct authenticated approvers and the requester MUST NOT satisfy the second approval., horizon: H1, status: committed}
  - {id: REQ-ACT-003, title: Compensating rollback, statement: The Jira action MUST record before and after state and provide an authorized idempotent compensation workflow., horizon: H1, status: committed}
  - {id: REQ-ACT-004, title: Prohibited high-impact autonomy, statement: Employment legal financial production identity destructive and security-control decisions MUST remain non-executable through H3., horizon: H3, status: committed}
  - {id: REQ-SIM-001, title: Reproducible scheduler, statement: H1 MUST use a seeded PERT Monte Carlo dependency-DAG scheduler rather than LLM-authored mathematics., horizon: H1, status: committed}
  - {id: REQ-SIM-002, title: Typed scenario, statement: Scenario inputs assumptions interventions snapshot model version and random seed MUST be typed confirmed and persisted., horizon: H1, status: committed}
  - {id: REQ-SIM-003, title: Uncertainty output, statement: Simulation MUST return p50 p80 p95 critical path blockers sensitivity uncertainty assumptions and missing-data warnings., horizon: H1, status: committed}
  - {id: REQ-SIM-004, title: Honest claims, statement: Synthetic scenarios MUST be labeled demonstrative and MUST NOT claim causal or production predictive validity., horizon: H1, status: committed}
  - {id: REQ-SIM-005, title: Prediction governance, statement: Forecasts MUST define outcome window data lineage calibration backtesting drift abstention fairness explanation and prohibited uses., horizon: H3, status: provisional}
  - {id: REQ-UX-001, title: Complete H1 surfaces, statement: H1 MUST include cockpit search graph evidence timeline scenario comparison agent run approval connector health and audit surfaces., horizon: H1, status: committed}
  - {id: REQ-UX-002, title: State completeness, statement: Every screen MUST define loading empty error denied stale partial offline destructive and recovery states., horizon: H1, status: committed}
  - {id: REQ-UX-003, title: Accessible operation, statement: H1 MUST meet WCAG 2.2 AA interaction contrast keyboard focus reduced-motion and assistive-technology requirements., horizon: H1, status: committed}
  - {id: REQ-UX-004, title: Evidence-first visualizations, statement: Graph and simulation visualizations MUST expose source evidence time confidence permissions uncertainty and accessible tabular alternatives., horizon: H1, status: committed}
  - {id: REQ-SEC-001, title: Zero-trust authorization, statement: Every privileged operation MUST authenticate authorize tenant-bind and audit at execution time., horizon: H1, status: committed}
  - {id: REQ-SEC-002, title: Source ACL propagation, statement: Source permissions and revocation MUST constrain all facts paths embeddings summaries caches counts notifications exports and agent context., horizon: H1, status: committed}
  - {id: REQ-SEC-003, title: Secret and key isolation, statement: Credentials MUST be envelope encrypted tenant scoped rotatable non-loggable and unavailable to model context., horizon: H1, status: committed}
  - {id: REQ-SEC-004, title: Audit integrity, statement: Sensitive reads writes approvals policy decisions and administrative actions MUST emit immutable tamper-evident audit events without unnecessary content., horizon: H1, status: committed}
  - {id: REQ-SEC-005, title: Privacy lifecycle, statement: The product MUST define purpose minimization classification retention legal hold access export correction deletion residency and subprocessor behavior., horizon: H2, status: committed}
  - {id: REQ-SEC-006, title: Control readiness, statement: The blueprint MUST map technical and organizational evidence for SOC 2 ISO 27001 and GDPR readiness without claiming certification., horizon: H2, status: committed}
  - {id: REQ-SEC-007, title: Supply-chain security, statement: Builds MUST use pinned dependencies provenance SBOM signing scanning protected CI identities and verified deployment artifacts., horizon: H2, status: committed}
  - {id: REQ-SEC-008, title: Incident response, statement: Security incidents MUST support detection containment evidence preservation notification recovery postmortem and control updates., horizon: H2, status: committed}
  - {id: REQ-REL-001, title: H1 performance envelope, statement: H1 MUST validate the committed two-tenant volume latency freshness concurrency and model-budget limits., horizon: H1, status: committed}
  - {id: REQ-REL-002, title: H2 service objectives, statement: H2 MUST provide 99.9 percent availability one-hour RPO four-hour RTO and tested restore procedures., horizon: H2, status: committed}
  - {id: REQ-REL-003, title: Distributed correctness, statement: Workflows MUST define retries idempotency ordering deduplication clock behavior partitions replay dead letters and backpressure., horizon: H1, status: committed}
  - {id: REQ-REL-004, title: Graceful degradation, statement: Dependency failures MUST have explicit fail-closed fail-open stale-read queue or unavailable behavior., horizon: H1, status: committed}
  - {id: REQ-REL-005, title: Full observability, statement: Every subsystem MUST emit structured logs metrics traces health readiness liveness performance error and audit signals with tenant-safe redaction., horizon: H1, status: committed}
  - {id: REQ-REL-006, title: Evidence-gated hyperscale, statement: Million-organization billion-node and trillion-edge designs MUST remain research until representative benchmarks establish a committed need., horizon: H5, status: research}
  - {id: REQ-DEV-001, title: Contract-first developer platform, statement: APIs events schemas ontology packages connectors plugins agents workflows SDKs CLI and webhooks MUST be versioned and testable independently., horizon: H2, status: committed}
  - {id: REQ-DEV-002, title: Reproducible local development, statement: A documented one-command local profile MUST provide deterministic seed data dependencies validation and observability., horizon: H1, status: committed}
  - {id: REQ-DEV-003, title: Deployment safety, statement: CI CD MUST include contract migration security evaluation canary rollback and evidence gates., horizon: H2, status: committed}
  - {id: REQ-VER-001, title: Comprehensive verification, statement: Features MUST include unit contract integration security privacy edge failure performance regression and appropriate load chaos and AI evaluations., horizon: H1, status: committed}
  - {id: REQ-VER-002, title: Synthetic golden organization, statement: H1 MUST ship a versioned seed and oracle for expected graph facts permissions simulation and action outcomes., horizon: H1, status: committed}
  - {id: REQ-VER-003, title: Continuous AI evaluation, statement: AI changes MUST run task-specific golden adversarial tool-selection argument-accuracy citation abstention and policy evaluations., horizon: H1, status: committed}
  - {id: REQ-VER-004, title: Independent build readiness, statement: An independent engineer MUST confirm H1 can be built without a major unstated product data security topology or interface decision., horizon: H1, status: committed}
  - {id: REQ-VER-005, title: Zero blocking findings, statement: Specification release MUST have no open Critical or High risks and two consecutive clear cross-domain reviews., horizon: H1, status: committed}
