schema_version: 1
acceptance_criteria:
  - {id: AC-DOC-001, title: Metadata validity, evidence: Every normative Markdown artifact has valid unique frontmatter and every catalog and contract parses.}
  - {id: AC-DOC-002, title: Traceability coverage, evidence: Validator reports every REQ and QAR matched to artifacts decisions controls acceptance and horizon at 100 percent.}
  - {id: AC-DOC-003, title: Reproducible editions, evidence: Build produces stable consolidated Markdown HTML PDF and coverage report from a clean checkout.}
  - {id: AC-PROD-001, title: Five-minute demo narrative, evidence: Seed sync investigate simulate approve act and rollback flow completes deterministically from the golden fixture.}
  - {id: AC-TEN-001, title: Cross-tenant isolation, evidence: Tenant A cannot infer Tenant B resources through REST graph search vectors objects cache events agent traces errors or timing assertions.}
  - {id: AC-DATA-001, title: Ingestion idempotency, evidence: Duplicate reordered and replayed observations produce the same canonical state digest.}
  - {id: AC-DATA-002, title: Projection rebuild, evidence: Neo4j and search/vector projections rebuild from authoritative claims and preserve expected oracle digest and ACLs.}
  - {id: AC-DATA-003, title: Reversible merge, evidence: A false entity merge is undone without losing identities evidence history or unrelated relationships.}
  - {id: AC-CON-001, title: Signed webhook defense, evidence: Invalid stale replayed and wrong-tenant GitHub and Jira webhooks are denied and audited.}
  - {id: AC-CON-002, title: Reconciliation recovery, evidence: Missed webhook and partial backfill recover through cursor reconciliation without duplicate state.}
  - {id: AC-AI-001, title: Citation quality, evidence: Golden set citation precision is at least 0.95 and material unsupported claim rate is below 0.01.}
  - {id: AC-AI-002, title: Abstention, evidence: Missing conflicting restricted and stale evidence cases produce calibrated uncertainty or abstention.}
  - {id: AC-AI-003, title: Prompt-injection resistance, evidence: Adversarial connector content cannot change policy reveal other data or invoke unauthorized tools.}
  - {id: AC-AI-004, title: Tool accuracy, evidence: Tool choice and exact argument accuracy meet the approved task rubric on golden and adversarial cases.}
  - {id: AC-ACT-001, title: Dual approval, evidence: Requester self-approval single approval expired approval changed payload and wrong-policy approval all fail.}
  - {id: AC-ACT-002, title: Single external effect, evidence: Concurrent duplicate and replayed execution creates or updates exactly one Jira remediation issue.}
  - {id: AC-ACT-003, title: Compensation, evidence: Authorized rollback restores the captured prior state or records a human-action-required terminal state.}
  - {id: AC-SIM-001, title: Reproducible simulation, evidence: Same snapshot input model and seed yield the identical canonical p50 p80 p95 and sensitivity digest.}
  - {id: AC-SIM-002, title: Simulation edge cases, evidence: Cycles missing estimates impossible capacity disconnected work and contradictory interventions produce explicit validation outcomes.}
  - {id: AC-SEC-001, title: Secrets containment, evidence: Scans of logs traces prompts errors exports and artifacts contain no injected canary secrets.}
  - {id: AC-SEC-002, title: ACL revocation, evidence: Revoked source access is unavailable to all query and agent paths within the committed freshness objective.}
  - {id: AC-PRV-001, title: Deletion completeness, evidence: Deletion inventory proves removal across authoritative graph vector search cache object trace and backup-expiry workflows.}
  - {id: AC-REL-001, title: H1 latency, evidence: Representative load meets graph p95 under 2 seconds simulation p95 under 10 seconds and cited answer p95 under 20 seconds.}
  - {id: AC-REL-002, title: H2 recovery, evidence: Restore drill demonstrates RPO no more than 1 hour and RTO no more than 4 hours.}
  - {id: AC-REL-003, title: Dependency degradation, evidence: Database graph object workflow cache search model and connector outage tests match documented fail-safe behavior.}
  - {id: AC-OBS-001, title: Correlated telemetry, evidence: Each golden workflow has a redacted end-to-end trace metrics logs health and audit linkage.}
  - {id: AC-UX-001, title: Accessible H1 journey, evidence: Keyboard and screen-reader users complete investigation simulation and approval with WCAG 2.2 AA review.}
  - {id: AC-SUP-001, title: Supply-chain evidence, evidence: Release includes SBOM vulnerability results signatures provenance and dependency license report.}
  - {id: AC-REV-001, title: Independent build readiness, evidence: Independent engineer records that H1 requires no unstated major product security data topology or interface decision.}
  - {id: AC-REV-002, title: Clear audit convergence, evidence: No open Critical or High risk and two consecutive cross-domain reviews introduce no new blocker.}

